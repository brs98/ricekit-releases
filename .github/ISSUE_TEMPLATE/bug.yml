name: Bug report
description: Something isn't working in RiceKit
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the fields below.

        For licensing or billing questions, email **brandon@ricekit.app** instead.

  - type: input
    id: version
    attributes:
      label: RiceKit version
      description: Found in Settings → About, or run `ricekit --version`
      placeholder: e.g. 1.2.3
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 14.4 (Sonoma)
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - Apple Silicon (M1/M2/M3/M4)
        - Intel
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open RiceKit
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Include relevant log output. Find logs at `~/Library/Logs/RiceKit/` or run the CLI with `--verbose`.
      render: shell
