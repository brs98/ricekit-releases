name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Tell us about it.

        Note: themes, templates, and app integrations are accepted as PRs in
        [ricekit-community](https://github.com/brs98/ricekit-community), not here.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A clear description of the user need or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like RiceKit to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds have you tried, or what else have you considered?
